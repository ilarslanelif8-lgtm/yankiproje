<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yankı — Akıllı Asistan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; }
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: system-ui, -apple-system, sans-serif;
            height: 100vh;
            margin: 0;
            display: flex;
        }
        .sidebar {
            width: 260px;
            background-color: #1e293b;
            border-right: 1px solid #334155;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        .header-bar {
            padding: 15px 25px;
            background-color: #1e293b;
            border-bottom: 1px solid #334155;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .chat-box {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .message-row {
            display: flex;
            gap: 12px;
            max-width: 80%;
        }
        .message-row.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }
        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
            flex-shrink: 0;
        }
        .avatar.assistant { background: #4f46e5; color: white; }
        .avatar.user { background: #22c55e; color: white; }
        .bubble {
            padding: 12px 18px;
            border-radius: 16px;
            font-size: 15px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .assistant .bubble { background-color: #1e293b; border: 1px solid #334155; color: #f8fafc; }
        .user .bubble { background-color: #2563eb; color: white; }
        .input-area {
            padding: 15px 25px;
            background-color: #1e293b;
            border-top: 1px solid #334155;
        }
        .input-container {
            background-color: #0f172a;
            border: 1px solid #334155;
            border-radius: 25px;
            padding: 6px 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .input-container input {
            background: transparent;
            border: none;
            color: white;
            outline: none;
            width: 100%;
            padding: 8px;
        }
        .btn-action {
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 18px;
            cursor: pointer;
        }
        .btn-action.active { color: #22c55e !important; }
        .btn-send {
            background-color: #2563eb;
            color: white;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h4 class="mb-4 text-primary"><i class="fa-solid fa-wand-magic-sparkles"></i> Yankı</h4>
        <button class="btn btn-outline-light w-100 text-start mb-3" onclick="location.reload()">
            <i class="fa-solid fa-plus me-2"></i> Yeni Sohbet
        </button>
        <div class="mt-auto pt-3 border-top border-secondary">
            <small class="text-muted d-block mb-2">{{ user.email }}</small>
            <a href="/logout" class="btn btn-sm btn-outline-danger w-100"><i class="fa-solid fa-right-from-bracket"></i> Çıkış Yap</a>
        </div>
    </div>

    <div class="main-chat">
        <div class="header-bar">
            <span class="badge bg-secondary p-2"><i class="fa-solid fa-bolt"></i> Hızlı Sunucu</span>
            <span class="badge bg-primary p-2"><i class="fa-solid fa-diamond"></i> Yankı-AI (Süper Hızlı)</span>
            <span class="badge bg-success p-2"><i class="fa-solid fa-circle"></i> Sistem Aktif</span>
        </div>

        <div class="chat-box" id="chatBox">
            <div class="message-row assistant">
                <div class="avatar assistant">Y</div>
                <div class="bubble">Merhaba! Ben Yankı. Sana nasıl yardımcı olabilirim?</div>
            </div>
        </div>

        <div class="input-area">
            <div class="input-container">
                <button class="btn-action" id="ttsBtn" onclick="toggleTTS()" title="Sesli Okumu Aç/Kapat">
                    <i class="fa-solid fa-volume-high"></i>
                </button>
                <input type="text" id="userInput" placeholder="Bir şeyler yazın..." onkeydown="if(event.key==='Enter') sendMessage()">
                <button class="btn-send" onclick="sendMessage()"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <script>
        let chatHistory = [];
        let ttsEnabled = false;

        function toggleTTS() {
            ttsEnabled = !ttsEnabled;
            const btn = document.getElementById('ttsBtn');
            if (ttsEnabled) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
                if ('speechSynthesis' in window) window.speechSynthesis.cancel();
            }
        }

        function speakText(text) {
            if (ttsEnabled && 'speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'tr-TR';
                window.speechSynthesis.speak(utterance);
            }
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const message = input.value.trim();
            if (!message) return;

            const chatBox = document.getElementById('chatBox');

            chatBox.innerHTML += `
                <div class="message-row user">
                    <div class="avatar user">S</div>
                    <div class="bubble">${message}</div>
                </div>
            `;
            input.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;

            const assistantRow = document.createElement('div');
            assistantRow.className = 'message-row assistant';
            assistantRow.innerHTML = `
                <div class="avatar assistant">Y</div>
                <div class="bubble">...</div>
            `;
            chatBox.appendChild(assistantRow);
            chatBox.scrollTop = chatBox.scrollHeight;

            const responseBubble = assistantRow.querySelector('.bubble');

            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message, history: chatHistory })
                });

                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                let fullText = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');

                    for (const line of lines) {
                        if (line.trim()) {
                            try {
                                const parsed = JSON.parse(line);
                                if (parsed.delta) {
                                    fullText += parsed.delta;
                                    responseBubble.innerText = fullText;
                                    chatBox.scrollTop = chatBox.scrollHeight;
                                }
                            } catch (e) {}
                        }
                    }
                }

                if (!fullText) {
                    responseBubble.innerText = 'Yanıt alınamadı, lütfen tekrar deneyin.';
                } else {
                    chatHistory.push({ role: 'user', content: message });
                    chatHistory.push({ role: 'assistant', content: fullText });
                    speakText(fullText);
                }

            } catch (err) {
                responseBubble.innerText = 'Bağlantı hatası oluştu.';
            }
        }
    </script>
</body>
</html>
