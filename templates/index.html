<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yankı — Akıllı Asistan</title>
    <link rel="icon" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/svgs/solid/wand-magic-sparkles.svg" type="image/svg+xml">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; }
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: system-ui, -apple-system, sans-serif;
            height: 100vh;
            height: 100dvh;
            margin: 0;
            display: flex;
            overflow: hidden;
        }
        .sidebar {
            width: 260px;
            background-color: #1e293b;
            border-right: 1px solid #334155;
            display: flex;
            flex-direction: column;
            padding: 20px;
            transition: all 0.3s ease;
        }
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh;
            width: 100%;
        }
        .header-bar {
            padding: 12px 20px;
            background-color: #1e293b;
            border-bottom: 1px solid #334155;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .chat-box {
            flex: 1;
            padding: 15px 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .message-row {
            display: flex;
            gap: 12px;
            max-width: 85%;
        }
        .message-row.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }
        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
            flex-shrink: 0;
        }
        .avatar.assistant { background: #4f46e5; color: white; }
        .avatar.user { background: #22c55e; color: white; }
        .bubble {
            padding: 12px 18px;
            border-radius: 16px;
            font-size: 15px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .assistant .bubble { background-color: #1e293b; border: 1px solid #334155; color: #f8fafc; }
        .user .bubble { background-color: #2563eb; color: white; }

        /* AÇIK GRİ KOD KUTUSU (TEMİZ & OKUNABİLİR) */
        .bubble code, .bubble pre {
            background-color: #e2e8f0 !important;
            color: #0f172a !important;
            border-radius: 8px;
            padding: 10px 14px;
            font-family: 'Consolas', 'Courier New', monospace;
            display: block;
            margin-top: 8px;
            margin-bottom: 8px;
            overflow-x: auto;
            border: 1px solid #cbd5e1;
            font-size: 14px;
            white-space: pre-wrap;
        }

        .bubble img {
            max-width: 100%;
            border-radius: 10px;
            margin-bottom: 8px;
            display: block;
        }

        .input-area {
            padding: 12px 20px;
            background-color: #1e293b;
            border-top: 1px solid #334155;
        }
        .image-preview-container {
            display: none;
            position: relative;
            margin-bottom: 8px;
        }
        .image-preview-container img {
            height: 60px;
            border-radius: 8px;
            border: 1px solid #475569;
        }
        .image-preview-container .btn-close-img {
            position: absolute;
            top: -5px;
            left: 50px;
            background: #ef4444;
            color: white;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .input-container {
            background-color: #0f172a;
            border: 1px solid #334155;
            border-radius: 25px;
            padding: 6px 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .input-container input[type="text"] {
            background: transparent;
            border: none;
            color: white;
            outline: none;
            width: 100%;
            padding: 8px;
            font-size: 15px;
        }
        .btn-action {
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 18px;
            cursor: pointer;
            padding: 4px 6px;
        }
        .btn-action.active { color: #22c55e !important; }
        .btn-send {
            background-color: #2563eb;
            color: white;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
        }

        /* MOBİL VE TABLET UYUMU (RESPONSIVE) */
        @media (max-width: 768px) {
            .sidebar {
                display: none; /* Mobilde kenar çubuğunu gizler */
            }
            .message-row {
                max-width: 92%;
            }
            .header-bar {
                padding: 10px 15px;
                font-size: 13px;
            }
            .chat-box {
                padding: 15px 10px;
            }
            .input-area {
                padding: 10px 12px;
            }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h4 class="mb-4 text-primary"><i class="fa-solid fa-wand-magic-sparkles"></i> Yankı</h4>
        <button class="btn btn-outline-light w-100 text-start mb-3" onclick="location.reload()">
            <i class="fa-solid fa-plus me-2"></i> Yeni Sohbet
        </button>
        <div class="mt-auto pt-3 border-top border-secondary">
            <small class="text-muted d-block mb-2">{{ user.email }}</small>
            <a href="/logout" class="btn btn-sm btn-outline-danger w-100"><i class="fa-solid fa-right-from-bracket"></i> Çıkış Yap</a>
        </div>
    </div>

    <div class="main-chat">
        <div class="header-bar">
            <span class="badge bg-secondary p-2"><i class="fa-solid fa-bolt"></i> Hızlı Sunucu</span>
            <span class="badge bg-primary p-2"><i class="fa-solid fa-diamond"></i> Yankı-AI</span>
            <span class="badge bg-success p-2"><i class="fa-solid fa-circle"></i> Sistem Aktif</span>
        </div>

        <div class="chat-box" id="chatBox">
            <div class="message-row assistant">
                <div class="avatar assistant">Y</div>
                <div class="bubble">Merhaba! Ben Yankı. Nasıl yardımcı olabilirim? Bugün ne yapmak istersin? 😊</div>
            </div>
        </div>

        <div class="input-area">
            <div class="image-preview-container" id="imgPreviewBox">
                <img id="imgPreview" src="" alt="Yüklenen Görsel">
                <div class="btn-close-img" onclick="removeImage()">✕</div>
            </div>
            <div class="input-container">
                <button class="btn-action" id="ttsBtn" onclick="toggleTTS()" title="Sesli Okumayı Aç/Kapat">
                    <i class="fa-solid fa-volume-high"></i>
                </button>
                
                <button class="btn-action" onclick="document.getElementById('imageInput').click()" title="Görsel Yükle">
                    <i class="fa-solid fa-paperclip"></i>
                </button>
                <input type="file" id="imageInput" accept="image/*" style="display: none;" onchange="handleImageUpload(event)">

                <input type="text" id="userInput" placeholder="Bir şeyler yazın..." onkeydown="if(event.key==='Enter') sendMessage()">
                <button class="btn-send" onclick="sendMessage()"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <script>
        let chatHistory = [];
        let ttsEnabled = false;
        let selectedBase64Image = null;
        let femaleVoice = null;

        // Tarayıcıdaki sesleri yükle ve doğal Kadın sesini bul
        function loadVoices() {
            if ('speechSynthesis' in window) {
                const voices = window.speechSynthesis.getVoices();
                // Türkçe sesler arasında kadın seslerini ara (Emel, Zira, Yalda, Filiz, Female vs.)
                femaleVoice = voices.find(v => v.lang.includes('tr') && (v.name.toLowerCase().includes('female') || v.name.toLowerCase().includes('zira') || v.name.toLowerCase().includes('emel') || v.name.toLowerCase().includes('filiz') || v.name.toLowerCase().includes('yelda')))
                              || voices.find(v => v.lang.includes('tr')) 
                              || null;
            }
        }

        if ('speechSynthesis' in window) {
            window.speechSynthesis.onvoiceschanged = loadVoices;
            loadVoices();
        }

        function toggleTTS() {
            ttsEnabled = !ttsEnabled;
            const btn = document.getElementById('ttsBtn');
            if (ttsEnabled) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
                if ('speechSynthesis' in window) window.speechSynthesis.cancel();
            }
        }

        function speakText(text) {
            if (ttsEnabled && 'speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                // Kod bloklarını ve sembolleri sesli okumaması için temizle
                let cleanText = text.replace(/```[\s\S]*?```/g, "kod bloğu.").replace(/`([^`]+)`/g, "$1");
                const utterance = new SpeechSynthesisUtterance(cleanText);
                utterance.lang = 'tr-TR';
                if (femaleVoice) {
                    utterance.voice = femaleVoice;
                }
                utterance.pitch = 1.1; // Kadın sesi tonlaması
                utterance.rate = 1.0;
                window.speechSynthesis.speak(utterance);
            }
        }

        function formatMessage(text) {
            let formatted = text.replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
            formatted = formatted.replace(/`([^`]+)`/g, '<code>$1</code>');
            return formatted;
        }

        function handleImageUpload(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(evt) {
                selectedBase64Image = evt.target.result;
                document.getElementById('imgPreview').src = selectedBase64Image;
                document.getElementById('imgPreviewBox').style.display = 'block';
            };
            reader.readAsDataURL(file);
        }

        function removeImage() {
            selectedBase64Image = null;
            document.getElementById('imageInput').value = '';
            document.getElementById('imgPreviewBox').style.display = 'none';
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const message = input.value.trim();
            
            if (!message && !selectedBase64Image) return;

            const chatBox = document.getElementById('chatBox');
            const imgToSend = selectedBase64Image;

            let userContentHtml = '';
            if (imgToSend) {
                userContentHtml += `<img src="${imgToSend}">`;
            }
            if (message) {
                userContentHtml += `<div>${message}</div>`;
            }

            chatBox.innerHTML += `
                <div class="message-row user">
                    <div class="avatar user">S</div>
                    <div class="bubble">${userContentHtml}</div>
                </div>
            `;

            input.value = '';
            removeImage();
            chatBox.scrollTop = chatBox.scrollHeight;

            const assistantRow = document.createElement('div');
            assistantRow.className = 'message-row assistant';
            assistantRow.innerHTML = `
                <div class="avatar assistant">Y</div>
                <div class="bubble">...</div>
            `;
            chatBox.appendChild(assistantRow);
            chatBox.scrollTop = chatBox.scrollHeight;

            const responseBubble = assistantRow.querySelector('.bubble');

            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message, image: imgToSend, history: chatHistory })
                });

                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                let fullText = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');

                    for (const line of lines) {
                        if (line.trim()) {
                            try {
                                const parsed = JSON.parse(line);
                                if (parsed.delta) {
                                    fullText += parsed.delta;
                                    responseBubble.innerHTML = formatMessage(fullText);
                                    chatBox.scrollTop = chatBox.scrollHeight;
                                }
                            } catch (e) {}
                        }
                    }
                }

                if (!fullText) {
                    responseBubble.innerText = 'Yanıt alınamadı, lütfen tekrar deneyin.';
                } else {
                    chatHistory.push({ role: 'user', content: message ? message : 'Görsel gönderildi' });
                    chatHistory.push({ role: 'assistant', content: fullText });
                    speakText(fullText);
                }

            } catch (err) {
                responseBubble.innerText = 'Bağlantı hatası oluştu.';
            }
        }
    </script>
</body>
</html>
