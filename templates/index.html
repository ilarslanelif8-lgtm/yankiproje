<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ assistant_name }} — Akıllı Asistan</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #0f1117; color: #e1e7ed; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sol Menü */
        .sidebar { width: 260px; background-color: #161922; border-right: 1px solid #232733; display: flex; flex-direction: column; padding: 20px; }
        .brand { font-size: 22px; font-weight: bold; color: #fff; margin-bottom: 25px; display: flex; align-items: center; gap: 10px; }
        .new-chat-btn { background-color: #232733; color: #fff; border: 1px solid #323849; padding: 12px; border-radius: 8px; cursor: pointer; text-align: left; font-weight: 600; margin-bottom: 20px; transition: 0.2s; }
        .new-chat-btn:hover { background-color: #2d3242; }
        .user-info { margin-top: auto; padding-top: 15px; border-top: 1px solid #232733; font-size: 13px; color: #8b949e; display: flex; justify-content: space-between; align-items: center; }
        .logout-link { color: #ff5555; text-decoration: none; font-weight: bold; }

        /* Ana Sohbet Alanı */
        .chat-container { flex: 1; display: flex; flex-direction: column; height: 100vh; }
        .header { height: 60px; border-bottom: 1px solid #232733; display: flex; align-items: center; padding: 0 25px; gap: 10px; font-size: 13px; }
        .badge { background: #232733; padding: 5px 12px; border-radius: 20px; color: #a3b8cc; }
        .badge-active { background: #1b382b; color: #40d685; }

        .chat-messages { flex: 1; padding: 25px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
        .message { display: flex; gap: 15px; max-width: 80%; }
        .message.user { align-self: flex-end; flex-direction: row-reverse; }
        .avatar { width: 36px; height: 36px; border-radius: 50%; background: #6366f1; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; flex-shrink: 0; }
        .message.user .avatar { background: #22c55e; }
        .bubble { background-color: #1a1e29; padding: 14px 18px; border-radius: 12px; font-size: 15px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
        .message.user .bubble { background-color: #2563eb; color: #fff; }

        /* Mesaj Giriş Kutusu */
        .input-container { padding: 20px; border-top: 1px solid #232733; background-color: #0f1117; }
        .input-box { display: flex; background: #161922; border: 1px solid #323849; border-radius: 12px; padding: 8px 12px; align-items: center; gap: 10px; }
        .input-box input { flex: 1; background: transparent; border: none; color: #fff; font-size: 15px; outline: none; padding: 8px; }
        .send-btn { background: #6366f1; color: #fff; border: none; width: 40px; height: 40px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; transition: 0.2s; }
        .send-btn:hover { background: #4f46e5; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="brand">✨ {{ assistant_name }}</div>
        <button class="new-chat-btn" onclick="window.location.reload()">+ Yeni Sohbet</button>
        <div class="user-info">
            <span>{{ user.email }}</span>
            <a href="{{ url_for('logout') }}" class="logout-link">Çıkış</a>
        </div>
    </div>

    <div class="chat-container">
        <div class="header">
            <span class="badge">⚡ 7/24 BULUT SUNUCUSU</span>
            <span class="badge">🔹 {{ model_name }}</span>
            <span class="badge badge-active">● Sistem Aktif</span>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="message assistant">
                <div class="avatar">Y</div>
                <div class="bubble">Merhaba! Ben {{ assistant_name }}. Sana nasıl yardımcı olabilirim?</div>
            </div>
        </div>

        <div class="input-container">
            <form id="chatForm" onsubmit="sendMessage(event)">
                <div class="input-box">
                    <input type="text" id="userInput" placeholder="Bir şeyler yazın..." autocomplete="off">
                    <button type="submit" class="send-btn" id="sendBtn">➔</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const chatMessages = document.getElementById('chatMessages');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        let history = [];

        async function sendMessage(event) {
            if (event) event.preventDefault();
            
            const message = userInput.value.trim();
            if (!message) return;

            // Kullanıcı mesajını ekrana yaz
            appendMessage('user', 'S', message);
            userInput.value = '';
            
            // Asistan için boş mesaj balonu oluştur
            const botBubble = appendMessage('assistant', 'Y', 'Yanıt yazılıyor...');

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message, history: history })
                });

                if (!response.ok) {
                    botBubble.innerText = "Bir hata oluştu. Lütfen tekrar deneyin.";
                    return;
                }

                botBubble.innerText = "";
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullResponse = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value, { stream: true });
                    const lines = chunk.split('\n');

                    for (const line of lines) {
                        if (line.trim()) {
                            try {
                                const parsed = JSON.parse(line);
                                if (parsed.delta) {
                                    fullResponse += parsed.delta;
                                    botBubble.innerText = fullResponse;
                                    chatMessages.scrollTop = chatMessages.scrollHeight;
                                }
                            } catch (e) {}
                        }
                    }
                }

                history.push({ role: 'user', content: message });
                history.push({ role: 'assistant', content: fullResponse });

            } catch (err) {
                botBubble.innerText = "Bağlantı hatası oluştu.";
            }
        }

        function appendMessage(role, avatarText, text) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}`;
            
            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            avatar.innerText = avatarText;

            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.innerText = text;

            msgDiv.appendChild(avatar);
            msgDiv.appendChild(bubble);
            chatMessages.appendChild(msgDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;

            return bubble;
        }
    </script>
</body>
</html>
