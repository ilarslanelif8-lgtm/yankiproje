<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Giriş Yap - Yankı AI</title>
    <style>
        body { font-family: Arial, sans-serif; background: #1e1e2f; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #2d2d44; padding: 30px; border-radius: 12px; width: 320px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        h2 { text-align: center; margin-bottom: 20px; }
        input { width: 100%; padding: 10px; margin: 8px 0; border-radius: 6px; border: none; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #6c5ce7; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        button:hover { background: #5b4bc4; }
        .link { text-align: center; margin-top: 15px; font-size: 14px; }
        .link a { color: #a29bfe; text-decoration: none; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🤖 Giriş Yap</h2>
        <form method="POST">
            <input type="email" name="email" placeholder="E-posta Adresi" required>
            <input type="password" name="password" placeholder="Şifre" required>
            <button type="submit">Giriş Yap</button>
        </form>
        <div class="link">Hesabın yok mu? <a href="/register">Kayıt Ol</a></div>
    </div>
</body>
</html>
